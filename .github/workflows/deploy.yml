name: Deploy to Server

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to Server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        port: ${{ secrets.SERVER_PORT }}
        username: ${{ secrets.SERVER_USERNAME }}
        password: ${{ secrets.SERVER_PASSWORD }}
        script: |
          if [ ! -d "/opt/roiify" ]; then
            mkdir -p /opt/roiify
            cd /opt/roiify
            git clone https://github.com/rgrvyhbv-png/xiaoxiao.git .
          fi
          
          cd /opt/roiify
          git pull origin master
          
          if [ ! -d "venv" ]; then
            python3 -m venv venv
          fi
          
          source venv/bin/activate
          pip install -r requirements.txt -q
          
          pkill gunicorn 2>/dev/null
          sleep 2
          
          mkdir -p logs
          for i in $(seq 0 2); do
            PORT=$((8765 + i))
            nohup gunicorn --workers=4 --bind=127.0.0.1:$PORT \
              --timeout=120 --access-logfile="logs/access_$PORT.log" \
              --error-logfile="logs/error_$PORT.log" \
              web_server:app > "logs/roiify_$PORT.log" 2>&1 &
          done
          
          echo "Deployment completed successfully"
