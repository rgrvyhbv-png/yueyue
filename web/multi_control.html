<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roiify 多线程控制面板</title>
<style>
:root {
  --bg: #0b0b12;
  --surface: #141420;
  --surface2: #1c1c2e;
  --border: #2a2a45;
  --text: #c5c5d8;
  --text-dim: #6a6a82;
  --accent: #00e4a0;
  --accent2: #7c5cfc;
  --warn: #f5a623;
  --err: #ff4757;
  --ok: #2ed573;
  --font: 'SF Mono', 'Cascadia Code', monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg); color: var(--text); font-family: var(--font);
  line-height: 1.65; min-height: 100vh;
}
.bg-glow {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 800px 400px at 10% 0%, rgba(124,92,252,0.07), transparent),
    radial-gradient(ellipse 600px 300px at 90% 10%, rgba(0,228,160,0.05), transparent);
}
.bg-grid {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(124,92,252,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(124,92,252,0.025) 1px, transparent 1px);
  background-size: 36px 36px;
}
.wrap { position:relative; z-index:1; max-width:1400px; margin:0 auto; padding:20px; }

header {
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 0 20px; border-bottom:1px solid var(--border); margin-bottom:20px;
}
.logo-row { display:flex; align-items:center; gap:12px; }
.logo-badge {
  width:42px; height:42px; border-radius:10px;
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  display:flex; align-items:center; justify-content:center;
  font-size:20px; font-weight:900; color:#000;
}
.logo-text h1 { font-size:17px; font-weight:700; }
.logo-text p { font-size:11px; color:var(--text-dim); }

.toolbar { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.toolbar button {
  padding:8px 16px; border-radius:7px; font-family:var(--font); font-size:12px;
  font-weight:700; cursor:pointer; transition:all .2s; border:none;
}
.btn-primary { background:linear-gradient(135deg,var(--accent),#00c48a); color:#000; }
.btn-primary:hover { opacity:.88; transform:translateY(-1px); }
.btn-danger { background:linear-gradient(135deg,var(--err),#c0392b); color:#fff; }
.btn-danger:hover { opacity:.88; transform:translateY(-1px); }

.stats-header {
  display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:20px;
}
.stat-card {
  background:var(--surface); border:1px solid var(--border); border-radius:10px;
  padding:14px; text-align:center;
}
.stat-card .v { font-size:22px; font-weight:800; }
.stat-card .l { font-size:10px; color:var(--text-dim); margin-top:3px; }
.v.ok { color:var(--ok); } .v.err { color:var(--err); } .v.hi { color:var(--accent); }

.grid-workers {
  display:grid; grid-template-columns:repeat(5,1fr); gap:12px;
}
@media (max-width:1200px) { .grid-workers { grid-template-columns:repeat(3,1fr); } }
@media (max-width:800px) { .grid-workers { grid-template-columns:repeat(2,1fr); } }

.worker-card {
  background:var(--surface); border:1px solid var(--border); border-radius:12px;
  padding:16px; transition:all .3s;
}
.worker-card.running { border-color:var(--accent); box-shadow:0 0 15px rgba(0,228,160,0.1); }
.worker-card.stopped { border-color:var(--border); }

.card-header {
  display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;
}
.worker-id { font-size:16px; font-weight:800; color:var(--accent2); }
.status-dot { width:10px; height:10px; border-radius:50%; }
.status-dot.running { background:var(--ok); box-shadow:0 0 8px var(--ok); animation:pulse 1s infinite; }
.status-dot.stopped { background:var(--text-dim); }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.5} }

.status-text { font-size:10px; font-weight:600; text-transform:uppercase; }
.status-text.running { color:var(--ok); }
.status-text.stopped { color:var(--text-dim); }

.info-row {
  display:flex; justify-content:space-between; padding:3px 0; font-size:11px;
  border-bottom:1px solid rgba(255,255,255,0.03);
}
.info-row:last-child { border-bottom:none; }
.info-row .l { color:var(--text-dim); }
.info-row .v { color:var(--text); font-weight:600; }
.info-row .v.ok { color:var(--ok); }

.card-actions {
  display:flex; gap:5px; margin-top:10px;
}
.card-actions button {
  flex:1; padding:5px 6px; font-size:10px; font-weight:600;
  border-radius:5px; cursor:pointer; border:none; transition:all .2s;
}
.card-actions .btn-single { background:rgba(0,228,160,0.1); color:var(--accent); border:1px solid var(--accent); }
.card-actions .btn-single:hover { background:var(--accent); color:#000; }
.card-actions .btn-auto { background:rgba(124,92,252,0.1); color:var(--accent2); border:1px solid var(--accent2); }
.card-actions .btn-auto:hover { background:var(--accent2); color:#fff; }
.card-actions .btn-stop { background:var(--err); color:#fff; }
.card-actions .btn-stop:hover { opacity:.8; }
.card-actions button:disabled { opacity:.4; cursor:not-allowed; }

.logs-area {
  max-height:100px; overflow-y:auto; font-size:10px; color:var(--text-dim);
  background:var(--surface2); border-radius:5px; padding:8px; margin-top:8px;
}
.logs-area::-webkit-scrollbar { width:4px; }
.logs-area::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

.toast {
  position:fixed; top:20px; right:20px; z-index:1000;
  padding:12px 20px; border-radius:8px; font-size:12px; font-weight:600;
  box-shadow:0 4px 20px rgba(0,0,0,0.3);
  animation:slideIn .3s ease-out;
}
@keyframes slideIn { from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1} }
.toast.success { background:var(--ok); color:#000; }
.toast.error { background:var(--err); color:#fff; }

.refresh-btn {
  background:transparent; border:1px solid var(--border); color:var(--text);
  padding:6px 12px; border-radius:5px; font-size:11px; cursor:pointer;
}
.refresh-btn:hover { border-color:var(--accent); color:var(--accent); }
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="bg-grid"></div>
<div class="wrap">

<header>
  <div class="logo-row">
    <div class="logo-badge">M</div>
    <div class="logo-text">
      <h1>Roiify 多线程控制面板</h1>
      <p>Single Process · 10 Workers</p>
    </div>
  </div>
  <div class="toolbar">
    <button class="btn-primary" onclick="startAllAuto()">🔄 全部开始循环</button>
    <button class="btn-danger" onclick="stopAll()">⏹ 全部停止</button>
    <button class="refresh-btn" onclick="loadWorkers()">🔄 刷新</button>
  </div>
</header>

<div class="stats-header">
  <div class="stat-card">
    <div class="v hi" id="totalWorkers">0</div>
    <div class="l">总线程数</div>
  </div>
  <div class="stat-card">
    <div class="v ok" id="runningCount">0</div>
    <div class="l">运行中</div>
  </div>
  <div class="stat-card">
    <div class="v" id="totalRevenue">$0.00</div>
    <div class="l">总收益</div>
  </div>
  <div class="stat-card">
    <div class="v" id="totalRuns">0</div>
    <div class="l">总运行次数</div>
  </div>
</div>

<div class="grid-workers" id="workersGrid">
  <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-dim)">加载中...</div>
</div>

</div>

<script>
let workers = [];
let pollTimer = null;

async function loadWorkers() {
  try {
    const r = await fetch('/api/workers');
    const d = await r.json();
    workers = d.workers;
    renderWorkers();
    updateStats();
  } catch(e) {
    console.error('Load workers failed:', e);
  }
}

async function loadStats() {
  try {
    const r = await fetch('/api/stats');
    const d = await r.json();
    document.getElementById('totalRevenue').textContent = '$' + d.total_revenue.toFixed(2);
    document.getElementById('totalRuns').textContent = d.total_runs;
  } catch(e) {}
}

function renderWorkers() {
  const grid = document.getElementById('workersGrid');
  let html = '';
  
  workers.forEach(w => {
    const statusClass = w.auto_running ? 'running' : 'stopped';
    const stats = w.stats || {};
    
    html += `
      <div class="worker-card ${statusClass}">
        <div class="card-header">
          <div class="worker-id">#${w.id}</div>
          <div style="display:flex;align-items:center;gap:6px">
            <div class="status-dot ${statusClass}"></div>
            <div class="status-text ${statusClass}">${w.auto_running ? '运行中' : '已停止'}</div>
          </div>
        </div>
        
        <div class="info-row">
          <span class="l">运行次数</span>
          <span class="v">${stats.total_runs || 0}</span>
        </div>
        <div class="info-row">
          <span class="l">收益</span>
          <span class="v ok">$${(stats.total_revenue || 0).toFixed(2)}</span>
        </div>
        <div class="info-row">
          <span class="l">点击率</span>
          <span class="v">${w.click_rate || 0}%</span>
        </div>
        
        <div class="card-actions">
          <button class="btn-single" onclick="startSingle(${w.id})" ${w.running ? 'disabled' : ''}>▶ 单次</button>
          <button class="btn-auto" onclick="startAuto(${w.id})" ${w.auto_running ? 'disabled' : ''}>🔄 循环</button>
          <button class="btn-stop" onclick="stopWorker(${w.id})" ${!w.auto_running ? 'disabled' : ''}>⏹ 停止</button>
        </div>
        
        <div class="logs-area" id="logs-${w.id}">点击「▶ 单次」开始运行</div>
      </div>
    `;
  });
  
  grid.innerHTML = html;
}

function updateStats() {
  const running = workers.filter(w => w.auto_running).length;
  
  document.getElementById('totalWorkers').textContent = workers.length;
  document.getElementById('runningCount').textContent = running;
  
  let totalRev = 0;
  let totalRuns = 0;
  workers.forEach(w => {
    totalRev += (w.stats?.total_revenue || 0);
    totalRuns += (w.stats?.total_runs || 0);
  });
  
  document.getElementById('totalRevenue').textContent = '$' + totalRev.toFixed(2);
  document.getElementById('totalRuns').textContent = totalRuns;
}

async function callApi(url, method = 'POST') {
  try {
    const r = await fetch(url, { method });
    return await r.json();
  } catch(e) {
    showToast('error', '调用失败');
    return null;
  }
}

async function startSingle(id) {
  showToast('success', `线程 ${id} 开始单次运行`);
  
  const result = await callApi(`/api/worker/${id}/single`);
  if (result && !result.error) {
    const logs = document.getElementById(`logs-${id}`);
    logs.textContent = '运行完成: ' + JSON.stringify(result.result);
    await loadWorkers();
  }
}

async function startAuto(id) {
  const result = await callApi(`/api/worker/${id}/auto-start`);
  if (result && !result.error) {
    showToast('success', `线程 ${id} 开始自动循环`);
    await loadWorkers();
  }
}

async function stopWorker(id) {
  const result = await callApi(`/api/worker/${id}/stop`);
  if (result && !result.error) {
    showToast('success', `线程 ${id} 已停止`);
    await loadWorkers();
  }
}

async function startAllAuto() {
  showToast('success', '正在启动所有线程...');
  const result = await callApi('/api/all/auto-start');
  if (result && !result.error) {
    showToast('success', `成功启动 ${result.started} 个线程`);
  }
  setTimeout(loadWorkers, 2000);
}

async function stopAll() {
  if (!confirm('确定要停止所有线程吗？')) return;
  
  const result = await callApi('/api/all/stop');
  if (result && !result.error) {
    showToast('success', '所有线程已停止');
  }
  setTimeout(loadWorkers, 1000);
}

function showToast(type, msg) {
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => {
    toast.style.animation = 'slideIn .3s ease-out reverse';
    setTimeout(() => toast.remove(), 300);
  }, 3000);
}

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(() => {
    loadWorkers();
    loadStats();
  }, 5000);
}

loadWorkers();
loadStats();
startPolling();
</script>
</body>
</html>
