<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roiify 多实例控制面板</title>
<style>
:root {
  --bg: #0b0b12;
  --surface: #141420;
  --surface2: #1c1c2e;
  --border: #2a2a45;
  --text: #c5c5d8;
  --text-dim: #6a6a82;
  --accent: #00e4a0;
  --accent-dim: rgba(0,228,160,0.08);
  --accent2: #7c5cfc;
  --accent2-dim: rgba(124,92,252,0.08);
  --warn: #f5a623;
  --warn-dim: rgba(245,166,35,0.08);
  --err: #ff4757;
  --ok: #2ed573;
  --font: 'SF Mono', 'Cascadia Code', 'JetBrains Mono', 'Fira Code', 'Consolas', 'Menlo', monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { font-size: 13px; }
body {
  background: var(--bg); color: var(--text); font-family: var(--font);
  line-height: 1.65; min-height: 100vh;
}
.bg-glow {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 800px 400px at 10% 0%, rgba(124,92,252,0.07), transparent),
    radial-gradient(ellipse 600px 300px at 90% 10%, rgba(0,228,160,0.05), transparent);
}
.bg-grid {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(124,92,252,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(124,92,252,0.025) 1px, transparent 1px);
  background-size: 36px 36px;
}
.wrap { position:relative; z-index:1; max-width:1400px; margin:0 auto; padding:20px; }

header {
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 0 20px; border-bottom:1px solid var(--border); margin-bottom:20px;
}
.logo-row { display:flex; align-items:center; gap:12px; }
.logo-badge {
  width:42px; height:42px; border-radius:10px;
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  display:flex; align-items:center; justify-content:center;
  font-size:20px; font-weight:900; color:#000;
}
.logo-text h1 { font-size:17px; font-weight:700; letter-spacing:-0.3px; }
.logo-text p { font-size:11px; color:var(--text-dim); }

.toolbar { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.toolbar button {
  padding:8px 16px; border-radius:7px; font-family:var(--font); font-size:12px;
  font-weight:700; cursor:pointer; transition:all .2s; border:none;
}
.btn-primary {
  background:linear-gradient(135deg,var(--accent),#00c48a); color:#000;
}
.btn-primary:hover { opacity:.88; transform:translateY(-1px); }
.btn-danger {
  background:linear-gradient(135deg,var(--err),#c0392b); color:#fff;
}
.btn-danger:hover { opacity:.88; transform:translateY(-1px); }
.btn-secondary {
  background:var(--surface2); border:1px solid var(--border)!important; color:var(--text);
}
.btn-secondary:hover { border-color:var(--accent)!important; color:var(--accent); }

.stats-header {
  display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-bottom:20px;
}
.stat-card {
  background:var(--surface); border:1px solid var(--border); border-radius:10px;
  padding:14px; text-align:center;
}
.stat-card .v { font-size:22px; font-weight:800; }
.stat-card .l { font-size:10px; color:var(--text-dim); margin-top:3px; text-transform:uppercase; letter-spacing:.8px; }
.v.ok { color:var(--ok); } .v.err { color:var(--err); } .v.hi { color:var(--accent); } .v.dim { color:var(--text-dim); }

.grid-instances {
  display:grid; grid-template-columns:repeat(5,1fr); gap:12px;
}
@media (max-width:1200px) { .grid-instances { grid-template-columns:repeat(3,1fr); } }
@media (max-width:800px) { .grid-instances { grid-template-columns:repeat(2,1fr); } }
@media (max-width:500px) { .grid-instances { grid-template-columns:1fr; } }

.instance-card {
  background:var(--surface); border:1px solid var(--border); border-radius:12px;
  padding:16px; position:relative; transition:all .3s;
}
.instance-card.running { border-color:var(--accent); box-shadow:0 0 20px rgba(0,228,160,0.1); }
.instance-card.stopped { border-color:var(--border); }

.card-header {
  display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;
}
.instance-id {
  font-size:16px; font-weight:800; color:var(--accent2);
}
.status-dot {
  width:10px; height:10px; border-radius:50%;
}
.status-dot.running { background:var(--ok); box-shadow:0 0 8px var(--ok); animation:pulse 2s infinite; }
.status-dot.stopped { background:var(--text-dim); }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.5} }

.status-text {
  font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.8px;
}
.status-text.running { color:var(--ok); }
.status-text.stopped { color:var(--text-dim); }

.info-row {
  display:flex; justify-content:space-between; padding:4px 0; font-size:11px;
  border-bottom:1px solid rgba(255,255,255,0.03);
}
.info-row:last-child { border-bottom:none; }
.info-row .l { color:var(--text-dim); }
.info-row .v { color:var(--text); font-weight:600; }
.info-row .v.ok { color:var(--ok); }
.info-row .v.warn { color:var(--warn); }

.card-actions {
  display:flex; gap:6px; margin-top:12px;
}
.card-actions button {
  flex:1; padding:6px 8px; font-size:10px; font-weight:600;
  border-radius:5px; cursor:pointer; border:none; transition:all .2s;
}
.card-actions .btn-start { background:var(--accent-dim); color:var(--accent); border:1px solid var(--accent); }
.card-actions .btn-start:hover { background:var(--accent); color:#000; }
.card-actions .btn-stop { background:var(--err); color:#fff; }
.card-actions .btn-stop:hover { opacity:.8; }
.card-actions .btn-view { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
.card-actions .btn-view:hover { border-color:var(--accent2); color:var(--accent2); }

.card-actions .btn-start:disabled,
.card-actions .btn-stop:disabled {
  opacity:.4; cursor:not-allowed; transform:none;
}

.progress-bar {
  height:2px; background:var(--surface2); border-radius:1px; margin:8px 0; overflow:hidden;
}
.progress-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:1px; transition:width .5s; }

.toast {
  position:fixed; top:20px; right:20px; z-index:1000;
  padding:12px 20px; border-radius:8px; font-size:12px; font-weight:600;
  box-shadow:0 4px 20px rgba(0,0,0,0.3);
  animation:slideIn .3s ease-out;
}
@keyframes slideIn { from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1} }
.toast.success { background:var(--ok); color:#000; }
.toast.error { background:var(--err); color:#fff; }
.toast.info { background:var(--accent2); color:#fff; }

.refresh-btn {
  background:transparent; border:1px solid var(--border); color:var(--text);
  padding:6px 12px; border-radius:5px; font-size:11px; cursor:pointer;
}
.refresh-btn:hover { border-color:var(--accent); color:var(--accent); }
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="bg-grid"></div>
<div class="wrap">

<header>
  <div class="logo-row">
    <div class="logo-badge">M</div>
    <div class="logo-text">
      <h1>Roiify 多实例控制面板</h1>
      <p>Manage 10 Running Instances</p>
    </div>
  </div>
  <div class="toolbar">
    <button class="btn-primary" onclick="startAll()">▶ 全部启动</button>
    <button class="btn-danger" onclick="stopAll()">⏹ 全部停止</button>
    <button class="refresh-btn" onclick="loadInstances()">🔄 刷新</button>
  </div>
</header>

<div class="stats-header">
  <div class="stat-card">
    <div class="v hi" id="totalCount">0</div>
    <div class="l">总实例数</div>
  </div>
  <div class="stat-card">
    <div class="v ok" id="runningCount">0</div>
    <div class="l">运行中</div>
  </div>
  <div class="stat-card">
    <div class="v dim" id="stoppedCount">0</div>
    <div class="l">已停止</div>
  </div>
  <div class="stat-card">
    <div class="v" id="totalRevenue">$0.00</div>
    <div class="l">总收益</div>
  </div>
  <div class="stat-card">
    <div class="v" id="totalRuns">0</div>
    <div class="l">总运行次数</div>
  </div>
</div>

<div class="grid-instances" id="instancesGrid">
  <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-dim)">
    加载中...
  </div>
</div>

</div>

<script>
let instances = [];
let pollTimer = null;

async function loadInstances() {
  try {
    const r = await fetch('/api/instances');
    const d = await r.json();
    instances = d.instances;
    renderInstances();
    updateStats();
  } catch(e) {
    showToast('error', '加载失败: ' + e.message);
  }
}

function renderInstances() {
  const grid = document.getElementById('instancesGrid');
  let html = '';
  
  instances.forEach(inst => {
    html += `
      <div class="instance-card ${inst.running ? 'running' : 'stopped'}">
        <div class="card-header">
          <div class="instance-id">#${inst.id}</div>
          <div style="display:flex;align-items:center;gap:6px">
            <div class="status-dot ${inst.running ? 'running' : 'stopped'}"></div>
            <div class="status-text ${inst.running ? 'running' : 'stopped'}">
              ${inst.running ? '运行中' : '已停止'}
            </div>
          </div>
        </div>
        
        <div class="info-row">
          <span class="l">端口</span>
          <span class="v">${inst.port}</span>
        </div>
        <div class="info-row">
          <span class="l">PID</span>
          <span class="v">${inst.pid || '-'}</span>
        </div>
        <div class="info-row">
          <span class="l">地址</span>
          <span class="v" style="font-size:9px;word-break:break-all">:${inst.port}</span>
        </div>
        
        <div class="progress-bar">
          <div class="progress-fill" style="width:${inst.running ? '100%' : '0%'}"></div>
        </div>
        
        <div class="card-actions">
          <button class="btn-start" onclick="startInstance(${inst.id})" ${inst.running ? 'disabled' : ''}>
            ▶ 启动
          </button>
          <button class="btn-stop" onclick="stopInstance(${inst.id})" ${inst.running ? '' : 'disabled'}>
            ⏹ 停止
          </button>
          <button class="btn-view" onclick="openInstance(${inst.id})" ${inst.running ? '' : 'disabled'}>
            👁 查看
          </button>
        </div>
      </div>
    `;
  });
  
  grid.innerHTML = html;
}

function updateStats() {
  const running = instances.filter(i => i.running).length;
  const stopped = instances.filter(i => !i.running).length;
  
  document.getElementById('totalCount').textContent = instances.length;
  document.getElementById('runningCount').textContent = running;
  document.getElementById('stoppedCount').textContent = stopped;
}

async function startInstance(id) {
  try {
    const r = await fetch(`/api/instances/${id}/start`, { method: 'POST' });
    const d = await r.json();
    if (d.error) {
      showToast('error', `实例 ${id} 启动失败: ${d.error}`);
    } else {
      showToast('success', `实例 ${id} 启动成功`);
      setTimeout(loadInstances, 2000);
    }
  } catch(e) {
    showToast('error', `启动失败: ${e.message}`);
  }
}

async function stopInstance(id) {
  try {
    const r = await fetch(`/api/instances/${id}/stop`, { method: 'POST' });
    const d = await r.json();
    if (d.error) {
      showToast('error', `实例 ${id} 停止失败: ${d.error}`);
    } else {
      showToast('success', `实例 ${id} 已停止`);
      setTimeout(loadInstances, 1000);
    }
  } catch(e) {
    showToast('error', `停止失败: ${e.message}`);
  }
}

async function startAll() {
  try {
    const r = await fetch('/api/instances/all/start', { method: 'POST' });
    const d = await r.json();
    showToast('info', `正在启动 ${d.count} 个实例...`);
    setTimeout(loadInstances, 5000);
  } catch(e) {
    showToast('error', `启动失败: ${e.message}`);
  }
}

async function stopAll() {
  if (!confirm('确定要停止所有实例吗？')) return;
  try {
    const r = await fetch('/api/instances/all/stop', { method: 'POST' });
    const d = await r.json();
    showToast('success', '所有实例已停止');
    setTimeout(loadInstances, 2000);
  } catch(e) {
    showToast('error', `停止失败: ${e.message}`);
  }
}

function openInstance(id) {
  const inst = instances.find(i => i.id === id);
  if (inst && inst.running) {
    window.open(inst.url, '_blank');
  }
}

function showToast(type, msg) {
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => {
    toast.style.animation = 'slideIn .3s ease-out reverse';
    setTimeout(() => toast.remove(), 300);
  }, 3000);
}

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(loadInstances, 5000);
}

loadInstances();
startPolling();
</script>
</body>
</html>
