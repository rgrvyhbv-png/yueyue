<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roiify 多实例控制面板</title>
<style>
:root {
  --bg: #0b0b12;
  --surface: #141420;
  --surface2: #1c1c2e;
  --border: #2a2a45;
  --text: #c5c5d8;
  --text-dim: #6a6a82;
  --accent: #00e4a0;
  --accent-dim: rgba(0,228,160,0.08);
  --accent2: #7c5cfc;
  --accent2-dim: rgba(124,92,252,0.08);
  --warn: #f5a623;
  --warn-dim: rgba(245,166,35,0.08);
  --err: #ff4757;
  --ok: #2ed573;
  --font: 'SF Mono', 'Cascadia Code', 'JetBrains Mono', 'Fira Code', 'Consolas', 'Menlo', monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { font-size: 13px; }
body {
  background: var(--bg); color: var(--text); font-family: var(--font);
  line-height: 1.65; min-height: 100vh;
}
.bg-glow {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 800px 400px at 10% 0%, rgba(124,92,252,0.07), transparent),
    radial-gradient(ellipse 600px 300px at 90% 10%, rgba(0,228,160,0.05), transparent);
}
.bg-grid {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(124,92,252,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(124,92,252,0.025) 1px, transparent 1px);
  background-size: 36px 36px;
}
.wrap { position:relative; z-index:1; max-width:1400px; margin:0 auto; padding:20px; }

header {
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 0 20px; border-bottom:1px solid var(--border); margin-bottom:20px;
}
.logo-row { display:flex; align-items:center; gap:12px; }
.logo-badge {
  width:42px; height:42px; border-radius:10px;
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  display:flex; align-items:center; justify-content:center;
  font-size:20px; font-weight:900; color:#000;
}
.logo-text h1 { font-size:17px; font-weight:700; letter-spacing:-0.3px; }
.logo-text p { font-size:11px; color:var(--text-dim); }

.toolbar { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.toolbar button {
  padding:8px 16px; border-radius:7px; font-family:var(--font); font-size:12px;
  font-weight:700; cursor:pointer; transition:all .2s; border:none;
}
.target-settings {
  display:flex; align-items:center; gap:8px; background:var(--surface2);
  padding:6px 12px; border-radius:7px; border:1px solid var(--border);
}
.target-settings label { font-size:11px; color:var(--text-dim); font-weight:600; }
.target-settings input {
  width:100px; background:var(--surface); border:1px solid var(--border);
  color:var(--text); padding:6px 8px; border-radius:5px; font-family:var(--font);
  font-size:11px; outline:none;
}
.target-settings input:focus { border-color:var(--accent); }
.preset-btns { display:flex; gap:4px; }
.preset-btns button {
  padding:4px 8px; font-size:10px; font-weight:600; background:transparent;
  border:1px solid var(--border); color:var(--text); border-radius:4px;
  cursor:pointer;
}
.preset-btns button:hover { border-color:var(--accent); color:var(--accent); }
.browser-settings {
  display:flex; align-items:center; gap:8px; background:var(--surface2);
  padding:6px 12px; border-radius:7px; border:1px solid var(--border);
}
.browser-settings label { font-size:11px; color:var(--text-dim); font-weight:600; }
.browser-settings select {
  background:var(--surface); border:1px solid var(--border); color:var(--text);
  padding:4px 6px; border-radius:4px; font-size:11px; outline:none; cursor:pointer;
}
.browser-settings input[type="checkbox"] { width:14px; height:14px; cursor:pointer; }
.browser-settings input[type="number"] {
  width:60px; background:var(--surface); border:1px solid var(--border);
  color:var(--text); padding:4px 6px; border-radius:4px; font-size:11px; outline:none;
}
.btn-primary {
  background:linear-gradient(135deg,var(--accent),#00c48a); color:#000;
}
.btn-primary:hover { opacity:.88; transform:translateY(-1px); }
.btn-danger {
  background:linear-gradient(135deg,var(--err),#c0392b); color:#fff;
}
.btn-danger:hover { opacity:.88; transform:translateY(-1px); }
.btn-secondary {
  background:var(--surface2); border:1px solid var(--border)!important; color:var(--text);
}
.btn-secondary:hover { border-color:var(--accent)!important; color:var(--accent); }

.stats-header {
  display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-bottom:20px;
}
.stat-card {
  background:var(--surface); border:1px solid var(--border); border-radius:10px;
  padding:14px; text-align:center;
}
.stat-card .v { font-size:22px; font-weight:800; }
.stat-card .l { font-size:10px; color:var(--text-dim); margin-top:3px; text-transform:uppercase; letter-spacing:.8px; }
.v.ok { color:var(--ok); } .v.err { color:var(--err); } .v.hi { color:var(--accent); } .v.dim { color:var(--text-dim); }

.grid-instances {
  display:grid; grid-template-columns:repeat(5,1fr); gap:12px;
}
@media (max-width:1200px) { .grid-instances { grid-template-columns:repeat(3,1fr); } }
@media (max-width:800px) { .grid-instances { grid-template-columns:repeat(2,1fr); } }
@media (max-width:500px) { .grid-instances { grid-template-columns:1fr; } }

.instance-card {
  background:var(--surface); border:1px solid var(--border); border-radius:12px;
  padding:16px; position:relative; transition:all .3s;
}
.instance-card.online { border-color:var(--accent); box-shadow:0 0 20px rgba(0,228,160,0.1); }
.instance-card.offline { border-color:var(--border); opacity:.6; }
.instance-card.running { border-color:var(--accent2); box-shadow:0 0 20px rgba(124,92,252,0.15); }

.card-header {
  display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;
}
.instance-id {
  font-size:16px; font-weight:800; color:var(--accent2);
}
.status-dot {
  width:10px; height:10px; border-radius:50%;
}
.status-dot.online { background:var(--ok); box-shadow:0 0 8px var(--ok); animation:pulse 2s infinite; }
.status-dot.offline { background:var(--text-dim); }
.status-dot.running { background:var(--accent2); box-shadow:0 0 8px var(--accent2); animation:pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.5} }

.status-text {
  font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.8px;
}
.status-text.online { color:var(--ok); }
.status-text.offline { color:var(--text-dim); }
.status-text.running { color:var(--accent2); }

.info-row {
  display:flex; justify-content:space-between; padding:4px 0; font-size:11px;
  border-bottom:1px solid rgba(255,255,255,0.03);
}
.info-row:last-child { border-bottom:none; }
.info-row .l { color:var(--text-dim); }
.info-row .v { color:var(--text); font-weight:600; }
.info-row .v.ok { color:var(--ok); }
.info-row .v.warn { color:var(--warn); }
.info-row .v.hi { color:var(--accent); }

.card-actions {
  display:flex; gap:6px; margin-top:12px;
}
.card-actions button {
  flex:1; padding:6px 8px; font-size:10px; font-weight:600;
  border-radius:5px; cursor:pointer; border:none; transition:all .2s;
}
.card-actions .btn-sim { background:var(--accent-dim); color:var(--accent); border:1px solid var(--accent); }
.card-actions .btn-sim:hover { background:var(--accent); color:#000; }
.card-actions .btn-auto { background:var(--accent2-dim); color:var(--accent2); border:1px solid var(--accent2); }
.card-actions .btn-auto:hover { background:var(--accent2); color:#fff; }
.card-actions .btn-stop { background:var(--err); color:#fff; }
.card-actions .btn-stop:hover { opacity:.8; }
.card-actions .btn-view { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
.card-actions .btn-view:hover { border-color:var(--accent2); color:var(--accent2); }

.card-actions button:disabled {
  opacity:.4; cursor:not-allowed; transform:none;
}

.progress-bar {
  height:2px; background:var(--surface2); border-radius:1px; margin:8px 0; overflow:hidden;
}
.progress-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:1px; transition:width .5s; }

.toast {
  position:fixed; top:20px; right:20px; z-index:1000;
  padding:12px 20px; border-radius:8px; font-size:12px; font-weight:600;
  box-shadow:0 4px 20px rgba(0,0,0,0.3);
  animation:slideIn .3s ease-out;
}
@keyframes slideIn { from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1} }
.toast.success { background:var(--ok); color:#000; }
.toast.error { background:var(--err); color:#fff; }
.toast.info { background:var(--accent2); color:#fff; }

.refresh-btn {
  background:transparent; border:1px solid var(--border); color:var(--text);
  padding:6px 12px; border-radius:5px; font-size:11px; cursor:pointer;
}
.refresh-btn:hover { border-color:var(--accent); color:var(--accent); }

.instructions {
  background:var(--surface2); border:1px solid var(--border); border-radius:8px;
  padding:12px 16px; margin-bottom:16px;
  font-size:11px; color:var(--text-dim);
}
.instructions code {
  background:var(--surface); padding:2px 6px; border-radius:4px; color:var(--accent);
}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="bg-grid"></div>
<div class="wrap">

<header>
  <div class="logo-row">
    <div class="logo-badge">M</div>
    <div class="logo-text">
      <h1>Roiify 多实例控制面板</h1>
      <p>Manage 10 Running Instances</p>
    </div>
  </div>
  <div class="toolbar">
    <div class="target-settings">
      <label>目标展示量:</label>
      <input type="number" id="targetImpressions" placeholder="0=无限" min="0" max="1000000">
      <div class="preset-btns">
        <button onclick="setTarget(10000)">1万</button>
        <button onclick="setTarget(30000)">3万</button>
        <button onclick="setTarget(50000)">5万</button>
        <button onclick="setTarget(100000)">10万</button>
      </div>
    </div>
    <div class="browser-settings">
      <label>浏览器:</label>
      <input type="checkbox" id="browserEnabled" onchange="toggleBrowser()">
      <select id="browserType">
        <option value="chromium">Chrome</option>
        <option value="firefox">Firefox</option>
        <option value="webkit">Safari</option>
      </select>
      <input type="checkbox" id="browserHeadless" checked onchange="saveBrowserConfig()">
      <label style="font-size:10px">无头</label>
      <input type="number" id="browserWidth" value="375" onchange="saveBrowserConfig()">
      <input type="number" id="browserHeight" value="812" onchange="saveBrowserConfig()">
    </div>
    <button class="btn-primary" onclick="startAllAuto()">🔄 全部开始自动循环</button>
    <button class="btn-danger" onclick="stopAllSim()">⏹ 全部停止</button>
    <button class="refresh-btn" onclick="loadInstances()">🔄 刷新状态</button>
  </div>
</header>

<div class="instructions">
  <strong>部署说明:</strong> 使用SSH连接服务器后运行 <code>bash start_multiple.sh</code> 启动10个实例，然后刷新此页面查看状态。
</div>

<div class="stats-header">
  <div class="stat-card">
    <div class="v hi" id="totalCount">0</div>
    <div class="l">总实例数</div>
  </div>
  <div class="stat-card">
    <div class="v ok" id="onlineCount">0</div>
    <div class="l">在线</div>
  </div>
  <div class="stat-card">
    <div class="v dim" id="offlineCount">0</div>
    <div class="l">离线</div>
  </div>
  <div class="stat-card">
    <div class="v" id="totalRevenue">$0.00</div>
    <div class="l">总收益</div>
  </div>
  <div class="stat-card">
    <div class="v" id="totalRuns">0</div>
    <div class="l">总运行次数</div>
  </div>
</div>

<div class="grid-instances" id="instancesGrid">
  <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-dim)">
    加载中...
  </div>
</div>

</div>

<script>
const SERVER_IP = '178.236.47.224';
const BASE_PORT = 8765;
const MAX_INSTANCES = 8;

let instances = [];
let pollTimer = null;

async function checkInstance(port) {
  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 2000);
    
    const r = await fetch(`http://${SERVER_IP}:${port}/api/state`, {
      signal: controller.signal
    });
    
    clearTimeout(timeout);
    
    if (r.ok) {
      const d = await r.json();
      return {
        online: true,
        running: d.running || d.auto_running || false,
        phase: d.phase || 0,
        ...d
      };
    }
  } catch(e) {}
  
  return { online: false, running: false };
}

async function getInstanceStats(port) {
  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 2000);
    
    const r = await fetch(`http://${SERVER_IP}:${port}/api/stats`, {
      signal: controller.signal
    });
    
    clearTimeout(timeout);
    
    if (r.ok) {
      return await r.json();
    }
  } catch(e) {}
  
  return { total_runs: 0, success_runs: 0, total_revenue: 0, click_rate: 0 };
}

async function loadInstances() {
  const results = await Promise.all(
    Array.from({length: MAX_INSTANCES}, (_, i) => checkInstance(BASE_PORT + i))
  );
  
  instances = results.map((result, i) => ({
    id: i + 1,
    port: BASE_PORT + i,
    url: `http://${SERVER_IP}:${BASE_PORT + i}`,
    ...result
  }));
  
  await loadAllStats();
  renderInstances();
  updateStats();
}

async function loadAllStats() {
  let totalRevenue = 0;
  let totalRuns = 0;
  
  for (const inst of instances) {
    if (inst.online) {
      const stats = await getInstanceStats(inst.port);
      inst.stats = stats;
      totalRevenue += (stats.total_revenue || 0);
      totalRuns += (stats.total_runs || 0);
    }
  }
  
  document.getElementById('totalRevenue').textContent = '$' + totalRevenue.toFixed(2);
  document.getElementById('totalRuns').textContent = totalRuns;
}

function renderInstances() {
  const grid = document.getElementById('instancesGrid');
  let html = '';
  
  instances.forEach(inst => {
    const statusClass = inst.running ? 'running' : (inst.online ? 'online' : 'offline');
    const statusText = inst.running ? '运行中' : (inst.online ? '在线' : '离线');
    const stats = inst.stats || {};
    
    html += `
      <div class="instance-card ${statusClass}">
        <div class="card-header">
          <div class="instance-id">#${inst.id}</div>
          <div style="display:flex;align-items:center;gap:6px">
            <div class="status-dot ${statusClass}"></div>
            <div class="status-text ${statusClass}">${statusText}</div>
          </div>
        </div>
        
        <div class="info-row">
          <span class="l">端口</span>
          <span class="v">${inst.port}</span>
        </div>
        <div class="info-row">
          <span class="l">运行次数</span>
          <span class="v">${stats.total_runs || 0}${stats.target_impressions > 0 ? `/${stats.target_impressions.toLocaleString()}` : ''}</span>
        </div>
        <div class="info-row">
          <span class="l">收益</span>
          <span class="v ok">$${(stats.total_revenue || 0).toFixed(2)}</span>
        </div>
        <div class="info-row">
          <span class="l">点击率</span>
          <span class="v">${(stats.click_rate || 0)}%</span>
        </div>
        
        <div class="progress-bar">
          <div class="progress-fill" style="width:${inst.online ? (inst.running ? '100%' : '50%') : '0%'}"></div>
        </div>
        
        <div class="card-actions">
          <button class="btn-sim" onclick="startSim(${inst.id})" ${inst.online && !inst.running ? '' : 'disabled'}>
            ▶ 单次
          </button>
          <button class="btn-auto" onclick="startAuto(${inst.id})" ${inst.online && !inst.running ? '' : 'disabled'}>
            🔄 循环
          </button>
          <button class="btn-stop" onclick="stopSim(${inst.id})" ${inst.online && inst.running ? '' : 'disabled'}>
            ⏹ 停止
          </button>
          <button class="btn-view" onclick="openInstance(${inst.id})" ${inst.online ? '' : 'disabled'}>
            👁 查看
          </button>
        </div>
      </div>
    `;
  });
  
  grid.innerHTML = html;
}

function updateStats() {
  const online = instances.filter(i => i.online).length;
  const offline = instances.filter(i => !i.online).length;
  
  document.getElementById('totalCount').textContent = MAX_INSTANCES;
  document.getElementById('onlineCount').textContent = online;
  document.getElementById('offlineCount').textContent = offline;
}

async function callInstanceApi(id, endpoint, data = {}) {
  const inst = instances.find(i => i.id === id);
  if (!inst || !inst.online) {
    showToast('error', `实例 ${id} 离线`);
    return null;
  }
  
  try {
    const r = await fetch(`http://${SERVER_IP}:${inst.port}${endpoint}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    return await r.json();
  } catch(e) {
    showToast('error', `调用失败: ${e.message}`);
    return null;
  }
}

function getBrowserConfig() {
  return {
    enabled: document.getElementById('browserEnabled').checked,
    browser_type: document.getElementById('browserType').value,
    headless: document.getElementById('browserHeadless').checked,
    viewport_width: parseInt(document.getElementById('browserWidth').value) || 375,
    viewport_height: parseInt(document.getElementById('browserHeight').value) || 812,
    page_timeout: 30,
  };
}

async function saveBrowserConfig() {
  const config = getBrowserConfig();
  for (const inst of instances) {
    if (inst.online) {
      await fetch(`http://${SERVER_IP}:${inst.port}/api/browser`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(config)
      });
    }
  }
  if (config.enabled) {
    showToast('info', `已启用真实浏览器 (${config.browser_type})`);
  } else {
    showToast('info', '已禁用浏览器引擎');
  }
}

function toggleBrowser() {
  const enabled = document.getElementById('browserEnabled').checked;
  document.getElementById('browserType').disabled = !enabled;
  document.getElementById('browserHeadless').disabled = !enabled;
  document.getElementById('browserWidth').disabled = !enabled;
  document.getElementById('browserHeight').disabled = !enabled;
  saveBrowserConfig();
}

function getTargetImpressions() {
  const val = parseInt(document.getElementById('targetImpressions').value) || 0;
  return val;
}

function setTarget(val) {
  document.getElementById('targetImpressions').value = val;
}

async function startSim(id) {
  const result = await callInstanceApi(id, '/api/simulate');
  if (result && !result.error) {
    showToast('success', `实例 ${id} 开始单次模拟`);
    setTimeout(loadInstances, 1000);
  }
}

async function startAuto(id) {
  const target = getTargetImpressions();
  const result = await callInstanceApi(id, '/api/auto-start', { target_impressions: target });
  if (result && !result.error) {
    const msg = target > 0 ? `实例 ${id} 开始自动循环 (目标: ${target.toLocaleString()})` : `实例 ${id} 开始自动循环`;
    showToast('success', msg);
    setTimeout(loadInstances, 1000);
  }
}

async function stopSim(id) {
  const result = await callInstanceApi(id, '/api/stop');
  if (result && !result.error) {
    showToast('success', `实例 ${id} 已停止`);
    setTimeout(loadInstances, 1000);
  }
}

async function startAllAuto() {
  const onlineInstances = instances.filter(i => i.online && !i.running);
  if (onlineInstances.length === 0) {
    showToast('info', '没有可启动的在线实例');
    return;
  }
  
  const target = getTargetImpressions();
  const msg = target > 0 ? `正在启动 ${onlineInstances.length} 个实例... (目标: ${target.toLocaleString()})` : `正在启动 ${onlineInstances.length} 个实例...`;
  showToast('info', msg);
  
  for (const inst of onlineInstances) {
    await callInstanceApi(inst.id, '/api/auto-start', { target_impressions: target });
    await new Promise(r => setTimeout(r, 500));
  }
  
  const successMsg = target > 0 ? `全部实例已开始自动循环 (目标: ${target.toLocaleString()})` : '全部实例已开始自动循环';
  showToast('success', successMsg);
  setTimeout(loadInstances, 2000);
}

async function stopAllSim() {
  if (!confirm('确定要停止所有运行中的实例吗？')) return;
  
  const runningInstances = instances.filter(i => i.online && i.running);
  
  for (const inst of runningInstances) {
    await callInstanceApi(inst.id, '/api/auto-stop');
    await new Promise(r => setTimeout(r, 300));
  }
  
  showToast('success', '所有实例已停止');
  setTimeout(loadInstances, 1000);
}

function openInstance(id) {
  const inst = instances.find(i => i.id === id);
  if (inst && inst.online) {
    window.open(inst.url, '_blank');
  }
}

function showToast(type, msg) {
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => {
    toast.style.animation = 'slideIn .3s ease-out reverse';
    setTimeout(() => toast.remove(), 300);
  }, 3000);
}

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(loadInstances, 8000);
}

loadInstances();
startPolling();
</script>
</body>
</html>
